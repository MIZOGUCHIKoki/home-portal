x-go-service: &go-service
  build: .
  image: home-portal-go:latest
  volumes:
    - ./src/api-server:/src
  working_dir: /src
  depends_on:
    - db
  networks:
    - home-portal_network

services:
  app:
    <<: *go-service
    profiles: ["app"]
    container_name: home-portal-app
    ports:
      - "8080:8080"
    tty: true
    stdin_open: true
    command: >
      sh -c "
      if [ ! -f go.mod ]; then
        go mod init main
      fi &&
      go mod tidy &&
      go build -o /out/main . &&
      /out/main app
      "
  api:
    <<: *go-service
    profiles: ["api"]
    container_name: home-portal-api
    ports:
      - "8081:8080"
    tty: true
    stdin_open: true
    command: >
      sh -c "
      if [ ! -f go.mod ]; then
        go mod init main
      fi &&
      go mod tidy &&
      go build -o /out/main . &&
      /out/main api
      "
  setup:
    <<: *go-service
    container_name: home-portal-setup
    profiles: ["setup"]
    command: >
      sh -c "
      go mod tidy &&
      go build -o /out/main . &&
      /out/main setup
      "

  db:
    image: postgres:16-alpine
    container_name: home-portal-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: home-portal
      TZ: Asia/Tokyo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - home-portal_network

volumes:
  db_data:

networks:
  home-portal_network:
    driver: bridge
    name: home-portal_network
