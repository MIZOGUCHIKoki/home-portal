services:
  app:
      build: .
      container_name: budgetMS
      volumes:
        - ./src:/src
        - ./out:/out
      working_dir: /src
      command: >
        sh -c "
        if [ ! -f go.mod ]; then
          go mod init main
        fi &&
        go mod tidy &&
        go build -o /out/main . &&
        /out/main app
        "
      depends_on:
        - db
      tty: true
      stdin_open: true

  init:
      build: .
      profiles: ["tools"] # このサービスは tools プロフィールでのみで起動d
      volumes:
        - ./src:/src
        - ./out:/out
      working_dir: /src
      command: >
        sh -c "
        go mod tidy &&
        go build -o /out/main . &&
        /out/main setup
        "
      depends_on:
        - db

  db:
      image: postgres:16-alpine
      container_name: budgetMS-db
      environment:
        POSTGRES_USER: root
        POSTGRES_PASSWORD: password
        POSTGRES_DB: budgetMS
      ports:
        - "5432:5432"
      volumes:
        - db_data:/var/lib/postgresql/data

volumes:
  db_data:
